services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-miki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-miki}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-miki} -d ${POSTGRES_DB:-miki}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./server
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-miki}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-miki}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
      PORT: 3000
    volumes:
      - uploads:/app/uploads
    # Chỉ mở cổng trên localhost VPS (không phơi ra internet).
    # Ra ngoài đi qua Cloudflare Tunnel (bảo mật + HTTPS).
    ports:
      - "127.0.0.1:${API_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  # Web all-in-one: phục vụ frontend + proxy /api,/uploads tới api (cùng origin).
  # castflow_caddy (proxy chung của VPS) reverse_proxy miki.bisapro.com -> web:80
  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

  # Cloudflare Tunnel: đưa API ra https://api.<domain> — không cần mở port, tự có SSL.
  # Bật bằng cách đặt COMPOSE_PROFILES=tunnel và TUNNEL_TOKEN trong .env
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - api

volumes:
  pgdata:
  uploads:
