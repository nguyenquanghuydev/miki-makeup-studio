  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

  input[type=text]:focus,input[type=email]:focus,input[type=password]:focus,textarea:focus,select:focus{outline:2px solid #141414;outline-offset:0;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#f6f4f1;}
  ::-webkit-scrollbar-thumb{background:#cfccc6;}

  /* hover helpers */
  .btn-dark{transition:opacity .15s;}
  .btn-dark:hover{opacity:.85;}
  .btn-sm-dark:hover{opacity:.8;}
  .btn-ghost{transition:background .15s;}
  .btn-ghost:hover{background:#f0ede9;}
  .addrow:hover{background:#f6f4f1;}
  .quicklink{transition:background .15s;}
  .quicklink:hover{background:#ececec;}
  tr.hoverable{transition:background .12s;}
  tr.hoverable:hover{background:#fafaf9;}
  .logout:hover{color:#f3f1ee !important;}
  .del-x:hover{color:#c0392b !important;}
  .img-remove:hover{background:#c0392b !important;}
  .testi-del:hover{border-color:#c0392b !important;color:#c0392b !important;}
  .faq-del:hover{color:#c0392b !important;}
  .navbtn{transition:background .12s;}

  /* ===== Mobile: top bar + slide sidebar ===== */
  #adminTopbar{ display:none; }
  #adminOverlay{ display:none; }
  .sidebar-close{ display:none; }
  @media (max-width: 820px){
    .sidebar-close{ display:block !important; }
    #adminTopbar{
      display:flex; align-items:center; gap:14px;
      position:sticky; top:0; z-index:50;
      background:#141414; color:#f3f1ee; padding:12px 16px;
    }
    #adminSidebar{
      position:fixed !important; top:0; left:0; bottom:0;
      height:100vh !important; z-index:70;
      transform:translateX(-100%); transition:transform .28s ease;
    }
    #adminSidebar.open{ transform:translateX(0); box-shadow:0 0 60px rgba(0,0,0,.45); }
    #adminOverlay.show{
      display:block; position:fixed; inset:0;

    .mstack{ grid-template-columns:1fr !important; }
    .mstack2{ grid-template-columns:1fr 1fr !important; }
    #adminMain h1{ font-size:28px !important; }

async function pushContent(key, data){
  if(!SB) return;
  try { await SB.from('site_content').upsert({ key:key, data:data, updated_at:new Date().toISOString() }, { onConflict:'key' }); }
  catch(e){ console.warn('pushContent lỗi', key, e); }
}
async function loadAdminData(){
  if(!SB) return;
  try {
    var c = await SB.from('site_content').select('key,data');
    if(!c.error && c.data){
      var m = {}; c.data.forEach(function(r){ m[r.key] = r.data; });
      if(Array.isArray(m.pricing)) state.pricing = m.pricing;
      if(Array.isArray(m.courses)) state.courses = m.courses;
      if(Array.isArray(m.faq)) state.faqs = m.faq;
      if(Array.isArray(m.testimonials)) state.testimonials = m.testimonials;
      if(m.settings && typeof m.settings === 'object') state.settings = Object.assign({}, state.settings, m.settings);
      state.images = m.images || {};
    }
    var b = await SB.from('bookings').select('*').order('created_at', { ascending:false });
    if(!b.error && b.data) state.bookings = b.data;
    render();
  } catch(e){ console.warn('loadAdminData lỗi', e); }
}

/* ======================= ACTIONS ======================= */
async function doLogin(e){
  if(e && e.preventDefault) e.preventDefault();
  if(SB){
    var email = (document.getElementById('emailInput')||{}).value || '';
    var pw = document.getElementById('pwInput').value;
    var res = await SB.auth.signInWithPassword({ email:email, password:pw });
    if(res.error){ state.loginErr=true; render(); return; }
    state.page='dash'; state.loginErr=false; render();
    loadAdminData();
    return;
  }
  var v = document.getElementById('pwInput').value;
  if(v === getPw()){ localStorage.setItem(LS.AUTH,'ok'); state.page='dash'; state.loginErr=false; }
  else { state.loginErr=true; }
  render();
}
async function doLogout(){
  if(SB){ try { await SB.auth.signOut(); } catch(e){} }
  localStorage.removeItem(LS.AUTH); state.page='login'; state.loginErr=false; render();
}
function nav(p){ state.page=p; state.savedMsg=false; state.menuOpen=false; render(); }
async function changePw(){
  var v = document.getElementById('newPwInput').value;
  if(!v) return;
  if(SB){
    var r = await SB.auth.updateUser({ password:v });
    if(r.error){ alert('Lỗi đổi mật khẩu: ' + r.error.message); return; }
  } else {
    ss(LS.PW, v);
  }
  document.getElementById('newPwInput').value='';
  state.pwSaved=true; render();
  setTimeout(function(){ state.pwSaved=false; render(); }, 2400);
}

async function confirmBk(id){
  if(SB){ try { await SB.from('bookings').update({ status:'Đã xác nhận' }).eq('id', id); } catch(e){} }
  state.bookings = state.bookings.map(function(b){ return b.id===id ? Object.assign({},b,{status:'Đã xác nhận'}) : b; });
  ss(LS.BOOKINGS,state.bookings); render();
}
async function deleteBk(id){
  if(SB){ try { await SB.from('bookings').delete().eq('id', id); } catch(e){} }
  state.bookings = state.bookings.filter(function(b){ return b.id!==id; });
  ss(LS.BOOKINGS,state.bookings); render();
}

  ss(LS.BOOKINGS,state.bookings); render();
}

/* images */
function uploadImage(key){
  var input = document.createElement('input');
  input.type='file'; input.accept='image/*';
  input.onchange = async function(ev){
    var f = ev.target.files && ev.target.files[0]; if(!f) return;
    if(SB){
      try {
        var ext = (f.name.split('.').pop() || 'jpg').toLowerCase();
        var path = key + '-' + Date.now() + '.' + ext;
        var up = await SB.storage.from(BUCKET).upload(path, f, { upsert:true, cacheControl:'3600' });
        if(up.error){ alert('Lỗi tải ảnh: ' + up.error.message); return; }
        var url = SB.storage.from(BUCKET).getPublicUrl(path).data.publicUrl;
        state.images = Object.assign({}, state.images, {}); state.images[key] = url;
        await pushContent('images', state.images);
        render();
      } catch(e){ alert('Lỗi tải ảnh: ' + e.message); }
    } else {
      var rd = new FileReader();
      rd.onload = function(){ var ov = Object.assign({}, getImgOverrides()); ov[key] = rd.result; ss(LS.IMG,ov); render(); };
      rd.readAsDataURL(f);
    }
  };
  input.click();
}
async function removeImage(key){
  if(SB){
    state.images = Object.assign({}, state.images); delete state.images[key];
    await pushContent('images', state.images);
    render();
  } else {
    var ov = Object.assign({}, getImgOverrides()); delete ov[key]; ss(LS.IMG,ov); render();
  }
}

    + '<div style="margin-bottom:32px;"><div style="font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:#8a8784;margin-bottom:10px;">Quản lý</div>'
    + '<h1 style="font-family:\'Playfair Display\',serif;font-size:36px;font-weight:600;margin:0 0 10px;">Cấu hình hình ảnh</h1>'
    + '<p style="font-size:14px;color:#8a8784;margin:0;">Tải lên ảnh thật để thay thế ảnh mẫu trên website. Ảnh được lưu vào trình duyệt, cập nhật ngay lập tức.</p></div>'
    + body + '</div>';
}

function settingsHTML(){
  var fields = settingsFields.map(function(sf){
    return '<label style="display:grid;gap:7px;">'
      + '<span style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8a8784;">'+escH(sf.label)+'</span>'
      + '<input type="text" value="'+escA(state.settings[sf.key]||'')+'" onchange="updateSetting(\''+sf.key+'\',this.value)" style="border:none;border-bottom:1.5px solid #e6e3de;padding:10px 2px;font-size:15px;background:none;" /></label>';
  }).join('');
  return '<div style="animation:fade .3s ease both;">'
    + pageHeader('Hệ thống','Cài đặt')
    + '<div style="background:#fff;border:1px solid #e6e3de;padding:32px;max-width:520px;">'
    + '<div style="font-size:14px;font-weight:600;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid #e6e3de;">Thông tin studio</div>'
    + '<div style="display:grid;gap:18px;">'+fields+'</div>'
    + '<button class="btn-dark" onclick="saveSettings()" style="background:#141414;color:#fff;border:none;cursor:pointer;font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:15px 32px;margin-top:28px;">Lưu cài đặt</button>'
    + (state.savedMsg ? savedSpan : '')
    + '</div>'
    + '<div style="background:#fff;border:1px solid #e6e3de;padding:32px;max-width:520px;margin-top:20px;">'
    + '<div style="font-size:14px;font-weight:600;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid #e6e3de;">Đổi mật khẩu admin</div>'
    + '<div style="display:grid;gap:14px;"><label style="display:grid;gap:7px;"><span style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#8a8784;">Mật khẩu mới</span>'
    + '<input id="newPwInput" type="password" placeholder="••••••••" style="border:none;border-bottom:1.5px solid #e6e3de;padding:10px 2px;font-size:15px;background:none;" /></label></div>'
    + '<button class="btn-dark" onclick="changePw()" style="background:#141414;color:#fff;border:none;cursor:pointer;font-size:12px;letter-spacing:.16em;text-transform:uppercase;padding:15px 32px;margin-top:22px;">Cập nhật mật khẩu</button>'
    + (state.pwSaved ? '<span style="margin-left:16px;font-size:13px;color:#27ae60;">✓ Đã cập nhật</span>' : '')
    + '</div></div>';
}

function pageContent(){
  switch(state.page){
    case 'dash': return dashHTML();
    case 'bookings': return bookingsHTML();
    case 'products': return productsHTML();
    case 'pricing': return pricingHTML();
    case 'courses': return coursesHTML();
    case 'testimonials': return testimonialsHTML();
    case 'faq': return faqHTML();
    case 'images': return imagesHTML();
    case 'settings': return settingsHTML();
    default: return dashHTML();
  }
}

/* ======================= RENDER ======================= */
function render(){
  var app = document.getElementById('app');
  app.style.fontFamily = "'Archivo',sans-serif";
  if(state.page === 'login'){ app.innerHTML = loginHTML(); return; }
  app.innerHTML = topbarHTML()
    + '<div id="adminOverlay" class="'+(state.menuOpen?'show':'')+'" onclick="closeSidebar()"></div>'
    + '<div style="display:flex;min-height:100vh;">'
    + sidebarHTML()
    + '<main id="adminMain" style="flex:1;min-width:0;padding:36px 40px;overflow:auto;">' + pageContent() + '</main>'
    + '</div>';
}

function topbarHTML(){
  return '<div id="adminTopbar">'
    + '<button onclick="toggleSidebar()" aria-label="Menu" style="background:none;border:none;cursor:pointer;color:#f3f1ee;padding:4px;display:flex;align-items:center;">'
    + '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#f3f1ee" stroke-width="1.7" stroke-linecap="round"><line x1="3" y1="7" x2="21" y2="7"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="17" x2="21" y2="17"></line></svg>'
    + '</button>'
    + '<div style="line-height:1;"><span style="font-family:\'Playfair Display\',serif;font-size:20px;font-weight:700;">Miki</span>'
    + '<span style="font-size:8px;letter-spacing:.34em;text-transform:uppercase;color:#8a8784;margin-left:8px;">Studio Admin</span></div>'
    + '</div>';
}
function toggleSidebar(){
  state.menuOpen = !state.menuOpen;
  var sb = document.getElementById('adminSidebar'); if(sb) sb.classList.toggle('open', state.menuOpen);
  var ov = document.getElementById('adminOverlay'); if(ov) ov.classList.toggle('show', state.menuOpen);
}
function closeSidebar(){
  state.menuOpen = false;
  var sb = document.getElementById('adminSidebar'); if(sb) sb.classList.remove('open');
  var ov = document.getElementById('adminOverlay'); if(ov) ov.classList.remove('show');
}

render();

/* ======================= SESSION (Supabase) ======================= */
if(SB){
  SB.auth.getSession().then(function(res){
    var hasSession = res && res.data && res.data.session;
    state.page = hasSession ? 'dash' : 'login';
    render();
    if(hasSession) loadAdminData();
  });
}
</script>
</body>
</html>
